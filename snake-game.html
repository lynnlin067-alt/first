<section id="snake-game-019f" aria-label="貪食蛇遊戲">
  <div class="viz-row" aria-live="polite">
    <span>分數：<strong id="snake-score">0</strong></span>
    <span>最高分：<strong id="snake-best">0</strong></span>
    <span id="snake-status" class="text-muted">按「開始遊戲」或方向鍵開始</span>
  </div>
  <canvas id="snake-board" role="img" aria-label="貪食蛇遊戲盤面；使用方向鍵或畫面按鈕控制" width="480" height="480"></canvas>
  <div class="viz-controls" aria-label="遊戲控制">
    <button id="snake-start" class="btn btn-primary" type="button">開始遊戲</button>
    <button id="snake-pause" class="btn" type="button" disabled>暫停</button>
    <button id="snake-reset" class="btn btn-ghost" type="button">重新開始</button>
  </div>
  <div class="viz-row" aria-label="方向控制">
    <button id="snake-up" class="btn" type="button" aria-label="向上">↑</button>
    <button id="snake-left" class="btn" type="button" aria-label="向左">←</button>
    <button id="snake-down" class="btn" type="button" aria-label="向下">↓</button>
    <button id="snake-right" class="btn" type="button" aria-label="向右">→</button>
  </div>
</section>

<style>
  #snake-game-019f { display: grid; gap: 1rem; justify-items: center; }
  #snake-game-019f .viz-row { width: 100%; justify-content: center; gap: 1rem; }
  #snake-board { width: min(100%, 480px); height: auto; aspect-ratio: 1; display: block; background: var(--muted); }
</style>

<script>
(() => {
  const root = document.getElementById('snake-game-019f');
  const canvas = document.getElementById('snake-board');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('snake-score');
  const bestEl = document.getElementById('snake-best');
  const statusEl = document.getElementById('snake-status');
  const startBtn = document.getElementById('snake-start');
  const pauseBtn = document.getElementById('snake-pause');
  const resetBtn = document.getElementById('snake-reset');
  const size = 20;
  let snake, food, direction, nextDirection, score, best = 0, timer = null, running = false, ended = false;
  try { best = Number(localStorage.getItem('snake-game-best-score')) || 0; } catch (_) { /* 儲存空間不可用時仍可正常遊玩 */ }

  function colors() {
    const css = getComputedStyle(root);
    return {
      bg: css.getPropertyValue('--muted').trim() || '#eef2f7',
      grid: css.getPropertyValue('--border').trim() || '#cbd5e1',
      snake: css.getPropertyValue('--viz-series-1').trim() || '#167c5a',
      food: css.getPropertyValue('--destructive').trim() || '#d14343',
      text: css.getPropertyValue('--foreground').trim() || '#18212f'
    };
  }
  function randomFood() {
    do { food = { x: Math.floor(Math.random() * size), y: Math.floor(Math.random() * size) }; }
    while (snake.some(p => p.x === food.x && p.y === food.y));
  }
  function updateText() {
    scoreEl.textContent = score;
    bestEl.textContent = best;
    try { localStorage.setItem('snake-game-best-score', String(best)); } catch (_) { /* 儲存空間不可用時略過 */ }
  }
  function reset() {
    stop(); ended = false; score = 0;
    snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
    direction = {x: 1, y: 0}; nextDirection = direction; randomFood();
    statusEl.textContent = '準備好了'; updateText(); draw();
    startBtn.textContent = '開始遊戲'; pauseBtn.disabled = true;
  }
  function stop() { if (timer) clearInterval(timer); timer = null; running = false; }
  function start() {
    if (ended) reset();
    if (running) return;
    running = true; timer = setInterval(step, 115);
    statusEl.textContent = '遊戲中'; startBtn.textContent = '遊戲中'; pauseBtn.disabled = false; pauseBtn.textContent = '暫停';
  }
  function pause() {
    if (!running) return;
    stop(); statusEl.textContent = '已暫停'; startBtn.textContent = '繼續遊戲'; pauseBtn.textContent = '繼續';
  }
  function end() {
    stop(); ended = true; statusEl.textContent = '遊戲結束！'; startBtn.textContent = '再玩一次'; pauseBtn.disabled = true; draw();
  }
  function step() {
    direction = nextDirection;
    const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
    const hit = head.x < 0 || head.x >= size || head.y < 0 || head.y >= size || snake.some(p => p.x === head.x && p.y === head.y);
    if (hit) { end(); return; }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) { score++; best = Math.max(best, score); randomFood(); updateText(); }
    else snake.pop();
    draw();
  }
  function draw() {
    const c = colors(), cell = canvas.width / size;
    ctx.fillStyle = c.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = c.grid; ctx.lineWidth = 1;
    for (let i = 0; i <= size; i++) { const p = i * cell; ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, canvas.height); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(canvas.width, p); ctx.stroke(); }
    ctx.fillStyle = c.food; ctx.beginPath(); ctx.arc((food.x + .5) * cell, (food.y + .5) * cell, cell * .31, 0, Math.PI * 2); ctx.fill();
    snake.forEach((p, i) => { ctx.fillStyle = c.snake; const pad = i === 0 ? 2 : 3; ctx.fillRect(p.x * cell + pad, p.y * cell + pad, cell - pad * 2, cell - pad * 2); });
    if (ended) { ctx.fillStyle = c.text; ctx.textAlign = 'center'; ctx.font = '500 24px sans-serif'; ctx.fillText('遊戲結束', canvas.width / 2, canvas.height / 2); }
  }
  function turn(x, y) {
    if (x === -direction.x && y === -direction.y) return;
    nextDirection = {x, y}; if (!running) start();
  }
  const keys = { ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0] };
  document.addEventListener('keydown', e => { if (keys[e.key]) { e.preventDefault(); turn(...keys[e.key]); } });
  [['snake-up',0,-1], ['snake-down',0,1], ['snake-left',-1,0], ['snake-right',1,0]].forEach(([id,x,y]) => document.getElementById(id).addEventListener('click', () => turn(x,y)));
  startBtn.addEventListener('click', start); pauseBtn.addEventListener('click', () => running ? pause() : start()); resetBtn.addEventListener('click', reset);
  reset();
})();
</script>
